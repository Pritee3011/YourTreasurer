{% extends "base.html" %}
{% block title %}Analysis{% endblock %}
{% block content %}
<section class="card">
    <h1>Analytics Dashboard</h1>
    <p id="stats-text">Loading stats...</p>
    <canvas id="doughnut-chart" height="120"></canvas>
</section>
<section class="card">
    <div style="display:flex;justify-content:space-between;gap:.8rem;align-items:center;flex-wrap:wrap;">
        <h2 id="trend-title">Today by Hour</h2>
        <div>
            <button class="btn" id="day-btn" type="button">Day View</button>
            <button class="btn btn-ghost" id="month-btn" type="button">Month View</button>
        </div>
    </div>
    <canvas id="trend-chart" height="110"></canvas>
</section>
{% endblock %}
{% block scripts %}
<script>
let doughnut;
let trend;
let trendData;
const statsText = document.getElementById("stats-text");
const trendTitle = document.getElementById("trend-title");
const dayBtn = document.getElementById("day-btn");
const monthBtn = document.getElementById("month-btn");

function rupee(v){ return `Rs. ${Number(v || 0).toFixed(2)}`; }

async function loadCategoryStats() {
    const res = await fetch("/api/stats");
    const data = await res.json();
    const labels = data.categories || [];
    const amounts = data.amounts || [];
    const total = amounts.reduce((a, b) => a + Number(b || 0), 0);
    const maxIndex = amounts.length ? amounts.indexOf(Math.max(...amounts.map(Number))) : -1;
    statsText.textContent = maxIndex >= 0
        ? `Top category: ${labels[maxIndex]} | Total tracked: ${rupee(total)}`
        : "No category data yet.";

    if (doughnut) doughnut.destroy();
    doughnut = new Chart(document.getElementById("doughnut-chart"), {
        type: "doughnut",
        data: { labels, datasets: [{ data: amounts }] },
        options: {
            animation: { animateRotate: true, duration: 1100 },
            plugins: { legend: { position: "bottom" } }
        }
    });
}

function setTrend(view) {
    if (!trendData) return;
    const next = trendData[view];
    trendTitle.textContent = view === "day" ? "Today by Hour" : "Last 30 Days";
    dayBtn.classList.toggle("btn-ghost", view !== "day");
    monthBtn.classList.toggle("btn-ghost", view !== "month");
    dayBtn.classList.toggle("btn", view === "day");
    monthBtn.classList.toggle("btn", view === "month");
    trend.config.type = view === "day" ? "bar" : "line";
    trend.data.labels = next.labels;
    trend.data.datasets[0].data = next.values;
    trend.update();
}

async function loadTrend() {
    const res = await fetch("/api/trend");
    const data = await res.json();
    trendData = data;
    trend = new Chart(document.getElementById("trend-chart"), {
        type: "bar",
        data: {
            labels: data.day.labels,
            datasets: [{ label: "Spend", data: data.day.values, borderWidth: 2 }]
        },
        options: { responsive: true, animation: { duration: 700 } }
    });
}

dayBtn.addEventListener("click", () => setTrend("day"));
monthBtn.addEventListener("click", () => setTrend("month"));

loadCategoryStats();
loadTrend();
</script>
{% endblock %}
