<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YourTreasurer - Insights</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background: #f4f7f9; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .analysis-container { max-width: 1100px; margin: 40px auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-back { text-decoration: none; color: #002366; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
        }

        .chart-card {
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 35, 102, 0.05);
            text-align: center;
            border: 1px solid #e1e8ed;
        }

        .full-width { grid-column: span 2; }

        .stat-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .total-amount { font-size: 3.5rem; font-weight: 800; color: #002366; margin: 10px 0; }
        .label { color: #657786; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        h3 { color: #002366; margin-bottom: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="analysis-container">
    <div class="header">
        <a href="/history" class="btn-back">← Back to History</a>
        <h2 style="color: #002366; margin: 0;">Financial Intelligence</h2>
        <div id="userTag" style="color: #657786; font-size: 0.9rem;"></div>
    </div>

    <div class="dashboard-grid">
        <div class="chart-card stat-box">
            <span class="label">Total Monthly Outflow</span>
            <div class="total-amount" id="totalDisplay">₹0</div>
            <p id="statusMsg" style="color: #1db954; font-weight: 600;"></p>
        </div>

        <div class="chart-card">
            <h3>Spend by Category</h3>
            <canvas id="categoryChart" height="250"></canvas>
        </div>

        <div class="chart-card full-width">
            <h3>30-Day Spending Trend</h3>
            <canvas id="trendChart" height="100"></canvas>
        </div>
    </div>
</div>

<script>
    const loggedUser = localStorage.getItem('username');

    if (!loggedUser) {
        window.location.href = '/my_profile';
    } else {
        $('#userTag').text("Analyzing: " + loggedUser);
        fetchAnalysisData();
    }

    function fetchAnalysisData() {
        $.get(`/api/analysis_data/${loggedUser}`, function(data) {
            
            // 1. Update the Big Number
            const total = data.category_amounts.reduce((a, b) => a + b, 0);
            $('#totalDisplay').text(`₹${total.toLocaleString()}`);
            
            if (total > 4000) {
                $('#statusMsg').text("Approaching your threshold!").css('color', '#ff4d4d');
            } else {
                $('#statusMsg').text("Spending is within healthy limits.");
            }

            // 2. Category Doughnut Chart
            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: data.categories,
                    datasets: [{
                        data: data.category_amounts,
                        backgroundColor: [
                            '#002366', // Navy
                            '#00d4ff', // Light Blue
                            '#1db954', // Green
                            '#ff4d4d', // Red
                            '#ffb100', // Yellow
                            '#9d50bb'  // Purple
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });

            // 3. Daily Trend Line Chart
            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: [{
                        label: 'Spending (₹)',
                        data: data.daily_amounts,
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#002366'
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        });
    }
</script>

</body>
</html>
