{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<section class="card" style="max-width:640px;margin:0 auto;">
    <h1>Budget Gateway</h1>
    <p style="color:#9fb0d8;">Login first. If user is new, signup mode is enabled automatically.</p>
    <form id="profile-form">
        <div class="grid-2">
            <label>Name
                <input name="name" required pattern="[A-Za-z ]+" minlength="3">
            </label>
            <label>Password
                <input name="password" type="password" required minlength="8">
            </label>
            <label id="email-wrap" class="hidden">Email
                <input name="email" type="email">
            </label>
            <label id="limit-wrap" class="hidden">Monthly Limit
                <input name="monthly_limit" type="number" min="1" step="0.01">
            </label>
        </div>
        <button class="btn" id="submit-btn" type="submit">Login</button>
    </form>
    <p id="profile-status"></p>
</section>
{% endblock %}
{% block scripts %}
<script>
const form = document.getElementById("profile-form");
const statusNode = document.getElementById("profile-status");
const limitWrap = document.getElementById("limit-wrap");
const emailWrap = document.getElementById("email-wrap");
const submitBtn = document.getElementById("submit-btn");
let mode = "login";

function playUnlockChime() {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    const gain = ctx.createGain();
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(0.15, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    gain.connect(ctx.destination);
    [660, 880].forEach((f, i) => {
        const o = ctx.createOscillator();
        o.frequency.value = f;
        o.connect(gain);
        o.start(now + i * 0.15);
        o.stop(now + i * 0.15 + 0.2);
    });
}

form.addEventListener("submit", async (event) => {
    event.preventDefault();
    statusNode.textContent = "Processing...";
    const payload = Object.fromEntries(new FormData(form).entries());
    payload.name = (payload.name || "").trim();
    const endpoint = mode === "signup" ? "/signup" : "/login";
    const response = await fetch(endpoint, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || !data.success) {
        if (data.needs_signup) {
            mode = "signup";
            limitWrap.classList.remove("hidden");
            emailWrap.classList.remove("hidden");
            submitBtn.textContent = "Create Profile";
        }
        statusNode.textContent = data.message || "Request failed.";
        return;
    }
    playUnlockChime();
    statusNode.textContent = data.message || "Success";
    setTimeout(() => window.location.href = data.redirect_url || "/", 400);
});
</script>
{% endblock %}
