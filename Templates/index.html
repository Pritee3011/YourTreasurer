{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<section class="grid-2">
    <article class="card">
        <h2 id="home-title">Dashboard</h2>
        <p>User: <strong>{{ session.get("user_name", "Unknown") }}</strong></p>
        <div class="progress-wrap">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p id="progress-text">Rs. 0 / Rs. 0</p>
        <p id="progress-meta"></p>
    </article>
    <article class="card">
        <h2>Track Expense</h2>
        <form id="expense-form" enctype="multipart/form-data">
            <label>Category
                <select name="category" required>
                    <option value="Junk Food">Junk Food</option>
                    <option value="Educational">Educational</option>
                    <option value="Travel">Travel</option>
                    <option value="Hostel Rent">Hostel Rent</option>
                    <option value="Lifestyle">Lifestyle</option>
                    <option value="Healthy Food">Healthy Food</option>
                    <option value="Other">Other</option>
                </select>
            </label>
            <label>Amount
                <input type="number" name="amount" min="1" step="0.01" required>
            </label>
            <label>Spent At
                <input type="text" name="spent_at" placeholder="Cafe / Store / UPI">
            </label>
            <label>Receipt (Cloudinary upload)
                <input type="file" name="receipt" accept="image/*">
            </label>
            <label><input type="checkbox" id="is-loan" name="is_loan" value="yes"> Is it a loan?</label>
            <div id="loan-fields" class="hidden">
                <label>Friend Name <input type="text" name="friend_name"></label>
                <label>Friend Email <input type="email" name="friend_email"></label>
                <label>Relationship <input type="text" name="friend_relationship"></label>
            </div>
            <button class="btn" id="track-btn" type="submit">Track Now</button>
            <p id="expense-status"></p>
        </form>
    </article>
</section>
{% endblock %}
{% block scripts %}
<script>
const bar = document.getElementById("progress-bar");
const text = document.getElementById("progress-text");
const meta = document.getElementById("progress-meta");
const homeTitle = document.getElementById("home-title");
const form = document.getElementById("expense-form");
const loanCheckbox = document.getElementById("is-loan");
const loanFields = document.getElementById("loan-fields");
const statusNode = document.getElementById("expense-status");
const trackBtn = document.getElementById("track-btn");

function tone(freq, dur = 0.16) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
}

function playCoinClink() { tone(860, 0.1); setTimeout(() => tone(1140, 0.1), 90); }

async function loadProgress() {
    const response = await fetch("/api/progress");
    if (!response.ok) return;
    const data = await response.json();
    const pct = Math.max(0, Math.min(100, data.progress || 0));
    bar.style.width = `${pct}%`;
    bar.style.background = pct < 60 ? "#4ade80" : pct < 85 ? "#facc15" : "#f87171";
    text.textContent = `Rs. ${Number(data.spent || 0).toFixed(2)} / Rs. ${Number(data.limit || 0).toFixed(2)}`;
    meta.textContent = `${Number(data.progress || 0).toFixed(1)}% budget used`;
    homeTitle.style.color = data.over_budget ? "#f87171" : "";
}

loanCheckbox.addEventListener("change", () => {
    loanFields.classList.toggle("hidden", !loanCheckbox.checked);
});

form.addEventListener("submit", async (event) => {
    event.preventDefault();
    statusNode.textContent = "Saving...";
    trackBtn.disabled = true;
    const body = new FormData(form);
    const response = await fetch("/add_expense", { method: "POST", body });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || !data.success) {
        statusNode.textContent = data.message || "Failed to save expense.";
        trackBtn.disabled = false;
        return;
    }
    playCoinClink();
    statusNode.textContent = "Expense logged.";
    form.reset();
    loanFields.classList.add("hidden");
    await loadProgress();
    trackBtn.disabled = false;
});

loadProgress();
</script>
{% endblock %}
